# configs/autotrash_temporal.yaml
# Same as default.yaml, but enables temporal (frame-level) kNN scoring.

# ------------------------------------------------------------------
# Paths
# ------------------------------------------------------------------
data:
  root: data/dcase2025t2
  melspec_dir: ${data.root}/melspec
  use_eval_normals: true

train:
  batch_size: 16
  num_workers: 2

# ------------------------------------------------------------------
# Model
# ------------------------------------------------------------------
model:
  embedding: HUBERT_BASE
  pooling: mean
  normalize: true

detector:
  k: 3
  distance: cosine
  temporal:
    enabled: true
    aggregation: p95
    percentile: 95
    frame_stride: 1

threshold:
  percentile: 90
  train_samples: 200

# ------------------------------------------------------------------
# Training / inference misc
# ------------------------------------------------------------------
dataloader:
  batch_size: 16
  num_workers: 2

device: auto

logging:
  level: info
  csv_out_dir: results/csv
  bank_out: results/memory_bank
