# configs/default.yaml
# ------------------------------------------------------------------
# Paths
# ------------------------------------------------------------------
data:
  # Root folder that holds dev_data/ and eval_data/ (download script creates it)
  root: data/dcase2025t2

  # Where pre-cached log-mel tensors will be stored by preprocess.py
  # (train_knn.py / infer.py look here first; falls back to WAVs if missing)
  melspec_dir: ${data.root}/melspec

  # Use the 10 “target-domain” normals from eval_data/train when building
  # the memory bank?  (true = include them, false = ignore)
  use_eval_normals: true

train:
  batch_size: 16       # same value you put in dataloader.batch_size
  num_workers: 2       # same as dataloader.num_workers

# ------------------------------------------------------------------
# FINALIZED PIPELINE: AutoTrash
# ------------------------------------------------------------------
# The finalized AutoTrash pipeline is clip-level scoring. In testing,
# the clip pipeline outperformed the window pipeline, so window mode is
# disabled by default.
#
# The clustered memory bank with k=6 clusters gave the best official
# score among tested cluster counts.
#
# The decision threshold is a fixed unsupervised 90th percentile of the
# memory-bank distance distribution. AutoTrash currently has anonymized
# unlabeled eval_data, so threshold tuning on eval labels is not valid.

# ------------------------------------------------------------------
# Pipeline mode
# ------------------------------------------------------------------
pipeline:
  # clip: one embedding per clip, clip bank, clip scoring.
  # window: window embeddings in the bank, window scoring with top-N aggregation.
  # Final AutoTrash default: clip. Window scoring is experimental.
  mode: clip
  win_frames: 50
  hop_frames: 50
  top_windows: 5

  # During inference, rebuild a missing/stale bank for the requested mode.
  auto_rebuild_bank: true

  # During training, remove stale banks for the same machine/mode family.
  cleanup_stale_banks: true

# ------------------------------------------------------------------
# Memory bank scoring
# ------------------------------------------------------------------
memory_bank:
  # plain: current global kNN memory bank.
  # clustered: clip-only KMeans bank with nearest-cluster kNN scoring.
  mode: clustered
  num_clusters: 6
  cluster_method: kmeans
  cluster_score_mode: nearest_cluster_knn
  # none | mean_ratio | zscore | robust_zscore
  cluster_score_normalization: none
  cluster_score_eps: 1e-6
  min_cluster_size: 3
  cleanup_stale_banks: true

# ------------------------------------------------------------------
# Embedding post-processing
# ------------------------------------------------------------------
embedding_postprocess:
  pca_whitening:
    enabled: false
    n_components: 128
    whiten: true
    l2_after: true

# ------------------------------------------------------------------
# Final AutoTrash ablation examples
# ------------------------------------------------------------------
# A) Current best baseline:
# pipeline:
#   mode: clip
# memory_bank:
#   mode: clustered
#   num_clusters: 6
#   cluster_score_normalization: none
# embedding_postprocess:
#   pca_whitening:
#     enabled: false
#
# B) Mean-ratio normalization:
# memory_bank:
#   mode: clustered
#   num_clusters: 6
#   cluster_score_normalization: mean_ratio
#
# C) Z-score normalization:
# memory_bank:
#   mode: clustered
#   num_clusters: 6
#   cluster_score_normalization: zscore
#
# D) Robust z-score:
# memory_bank:
#   mode: clustered
#   num_clusters: 6
#   cluster_score_normalization: robust_zscore
#
# E) Z-score + PCA whitening:
# memory_bank:
#   mode: clustered
#   num_clusters: 6
#   cluster_score_normalization: zscore
# embedding_postprocess:
#   pca_whitening:
#     enabled: true
#     n_components: 128
#     whiten: true
#     l2_after: true

# ------------------------------------------------------------------
# Domain-generalization augmentation
# ------------------------------------------------------------------
augmentation:
  # Code also accepts equivalent top-level AUG_* keys, e.g. AUG_ENABLE.
  # Set false for the exact clean baseline path.
  enabled: false
  seed: 42

  # Number of stochastic views in addition to the clean original.
  num_views_train: 4
  num_views_test: 0

  # "expand" stores clean + augmented embeddings in the memory bank.
  # "average" stores one averaged embedding per clip.
  memory_mode: average

  # Test score aggregation over clean + augmented views: median or mean.
  test_score_agg: median

  # Mild perturbations for microphone/domain shift robustness.
  gain_db: [-6, 6]
  noise_snr_db: [15, 35]
  time_shift_max: 0.05
  freq_mask_max: 8
  time_mask_max: 20
  colored_noise: true
  eq: true
  reverb: true

# ------------------------------------------------------------------
# Model
# ------------------------------------------------------------------
model:
  embedding: HUBERT_BASE          # built-in pipeline available in torchaudio 2.3
  embedding_mode: last_layer_mean # BEATs hidden-state pooling variant
  pooling: mean                   # time-avg over frame-level embeddings
  normalize: true                 # L2-norm each embedding before k-NN

detector:
  k: 3                            # k-nearest neighbours
  distance: cosine
  temporal:
    enabled: false                 # window/temporal scoring disabled by default
    aggregation: p95               # max | p95 | mean
    percentile: 95                 # used when aggregation=p95
    frame_stride: 1                # >1 subsamples frames to speed up

threshold:
  method: percentile
  percentile: 90                   # fixed unsupervised threshold percentile
  sweep_enabled: false             # disabled for unlabeled AutoTrash eval_data
  sweep_values: [80, 85, 90, 92.5, 95]
  train_samples: 200               # used only when detector.temporal.enabled=true

# ------------------------------------------------------------------
# Training / inference misc
# ------------------------------------------------------------------
dataloader:
  batch_size: 16
  num_workers: 2                  # Codespaces CPU warning suggests 2

device: auto                      # "auto" ⇒ CUDA if available, else CPU

logging:
  level: info
  csv_out_dir: results/csv        # infer.py writes DCASE-style CSVs here
  bank_out:   results/memory_bank # train_knn.py writes .pt and manifest.json
